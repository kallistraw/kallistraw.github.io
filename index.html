<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <!-- Essentials -->
    <meta charset="UTF-8" />
    <title>Kallistra</title>

    <!-- Mobile Specific Metas-->
    <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
    <meta http-equiv="refresh" content="text/html;charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=7,8,edge" />

    <!-- Metadata -->
    <meta name="author" content="Kallistra" />
    <meta name="description" content="Kallistra's home page" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&amp;display=swap"
      rel="stylesheet"
    />

    <!-- CSS Styles -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- Preloader -->
    <div id="preloader">
      <img
        class="loader mx-1"
        style="width: 10%; height: 10%"
        src="images/strawberry.png"
        alt="strawberry"
      />
      <img
        class="loader ml-10"
        style="width: 10%; height: 10%"
        src="images/strawberry.png"
        alt="strawberry"
      />
      <img
        class="loader mb-4"
        style="width: 20%; height: 20%; margin: 0 -3%"
        src="images/miffy-balloon.png"
        alt="miffy-balloon"
      />
      <img
        class="loader mr-10"
        style="width: 10%; height: 10%"
        src="images/strawberry.png"
        alt="strawberry"
      />
      <img
        class="loader mx-1"
        style="width: 10%; height: 10%"
        src="images/strawberry.png"
        alt="strawberry"
      />
    </div>

    <!-- Main -->
    <main class="flex-grow-1 d-flex justify-content-center align-items-center text-center">
      <div class="container">
        <h1 class="fw-semibold text-body-emphasis mb-4">Welcome to My Universe!</h1>
        <div class="nav-buttons justify-content-center">
          <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalIntro">
            Intro
          </button>
          <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalWork">Work</button>
          <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalAbout">
            About
          </button>
          <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalContact">
            Contact
          </button>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center sticky-bottom w-100 mb-3 text-muted">
      Made with sarcasm and semicolons. © 2025
    </footer>

    <!-- Intro -->
    <div class="modal fade" id="modalIntro" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-body-secondary">
          <div class="modal-header">
            <h5 class="modal-title">Intro</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">Here comes the intro like a soft breeze of Bootstrap!</div>
        </div>
      </div>
    </div>

    <!-- Stuff -->
    <div class="modal fade" id="modalWork" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-body-secondary">
          <div class="modal-header">
            <h5 class="modal-title">Work</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">All work and no play makes this modal a dull box.</div>
        </div>
      </div>
    </div>

    <!-- About -->
    <div class="modal fade" id="modalAbout" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-body-secondary">
          <div class="modal-header">
            <h5 class="modal-title">About</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">This modal tells you more than you asked for. Be warned.</div>
        </div>
      </div>
    </div>

    <!-- Contact -->
    <div class="modal fade" id="modalContact" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-body-secondary">
          <div class="modal-header">
            <h5 class="modal-title">Contact</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">You rang? Let’s chat, digitally of course.</div>
        </div>
      </div>
    </div>

    <!-- JavaScript Plugins -->
    <script src="assets/js/gsap.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>

    <!-- Main Sxript -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
