<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kallistra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="x-loader">×</div>
    </div>

    <!-- Your content goes here -->
    <main style="padding: 2rem">
      <h1>Hello, World!</h1>
      <p>This is your main site content.</p>
    </main>

    <script>
      // Wait for everything to load, then remove preloader
      window.addEventListener("load", () => {
        const pre = document.getElementById("preloader");
        pre.classList.add("fade-out");
        setTimeout(() => pre.remove(), 500);
      });
    </script>

    <!-- Footer -->
    <footer class="py-8 text-center text-sm">&copy; 2025 - Kallistra</footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/anime.iife.min.js"></script>
  </body>
</html>
